name: ValYouCard
options:
  bundleIdPrefix: com.valyoucard
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  ValYouCard:
    type: application
    platform: iOS
    sources:
      - path: ValYouCard
        excludes:
          - "Resources/Debug.xcconfig.template"
    settings:
      base:
        INFOPLIST_FILE: ValYouCard/Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.valyoucard.ios
        SWIFT_STRICT_CONCURRENCY: complete
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    info:
      path: ValYouCard/Resources/Info.plist
      properties:
        CFBundleDisplayName: Val-You Card
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
