name: ValYouCard
options:
  bundleIdPrefix: com.valyoucard
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "26.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

configFiles:
  Debug: Debug.xcconfig

targets:
  ValYouCard:
    type: application
    platform: iOS
    sources:
      - path: ValYouCard
        excludes:
          - "Resources/Debug.xcconfig.template"
    settings:
      base:
        INFOPLIST_FILE: ValYouCard/Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.valyoucard.ios
        SWIFT_STRICT_CONCURRENCY: complete
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    info:
      path: ValYouCard/Resources/Info.plist
      properties:
        CFBundleDisplayName: Val-You Card
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        API_URL: $(API_URL)
        REDEEM_API_URL: $(REDEEM_API_URL)
        STRAPI_URL: $(STRAPI_URL)
        BACKEND_URL: $(BACKEND_URL)
        ACCESS_TOKEN: $(ACCESS_TOKEN)
        MEMBER_KEY: $(MEMBER_KEY)
        STRIPE_PUBLISHABLE_KEY: $(STRIPE_PUBLISHABLE_KEY)
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - valyoucard
